name: Deploy pocketCFO to VM

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ghcr.io/chieh-hui-wei/pocketcfo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/chieh-hui-wei/pocketcfo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10m
          command_timeout: 10m
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            cat << 'EOF' > docker-compose.prod.yml
            version: "3.9"
            
            services:
              backend:
                platform: linux/amd64
                image: ghcr.io/chieh-hui-wei/pocketcfo-backend:latest
                ports:
                  - "8888:8888"
                volumes:
                  - ./uploads:/app/uploads
                  - ./secrets:/app/secrets
                env_file:
                  - .env
                restart: unless-stopped
            
              frontend:
                image: ghcr.io/chieh-hui-wei/pocketcfo-frontend:latest
                ports:
                  - "5173:5173"
                depends_on:
                  - backend
                restart: unless-stopped
            EOF
            
            # Log in to GHCR on VM using GH_PAT secret
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and restart containers using production compose
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            # Clean up old unused images and stopped containers to free VM disk space
            docker system prune -f
