version: "3.9"

services:
  backend:
    platform: linux/amd64
    image: ghcr.io/chieh-hui-wei/pocketcfo-backend:latest
    ports:
      - "8888:8888"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: ghcr.io/chieh-hui-wei/pocketcfo-frontend:latest
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
